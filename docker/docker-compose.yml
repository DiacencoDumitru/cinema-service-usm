services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cineverse
      POSTGRES_USER: cineverse
      POSTGRES_PASSWORD: cineverse
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cineverse -d cineverse']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cineverse
      SPRING_DATASOURCE_USERNAME: cineverse
      SPRING_DATASOURCE_PASSWORD: cineverse
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      JWT_SECRET: ${JWT_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      CORS_ORIGIN_1: http://localhost
      CORS_ORIGIN_2: http://localhost:80
      CORS_ORIGIN_3: http://localhost:5173
      CORS_ORIGIN_4: http://127.0.0.1
      CORS_ORIGIN_5: http://127.0.0.1:80
      CORS_ORIGIN_6: http://127.0.0.1:5173
    ports:
      - "8080:8080"
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS "http://127.0.0.1:8080/api/movies?limit=1" >/dev/null']
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 120s

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
  redisdata:
